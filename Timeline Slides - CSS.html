<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中國歷史時間軸 — CSS 自訂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', system-ui, sans-serif;
    background: #1a1a2e;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* Header */
  .hd {
    flex-shrink: 0;
    padding: 28px 48px 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .hd h2 {
    font-family: 'Noto Serif SC', Georgia, serif;
    font-size: 30px;
    font-weight: 900;
    color: #e8e4da;
    letter-spacing: 2px;
  }
  .hd h2 small {
    font-size: 14px;
    font-weight: 500;
    color: #b8860b;
    background: rgba(184,134,11,0.15);
    padding: 2px 12px;
    border-radius: 4px;
    margin-left: 10px;
    vertical-align: middle;
  }
  .hd .period {
    font-size: 15px;
    color: rgba(232,228,218,0.5);
    font-weight: 500;
  }

  /* Timeline area */
  .timeline-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 60px 40px;
    position: relative;
    min-height: 0;
  }
  .timeline-track {
    position: relative;
    width: 100%;
    height: 340px;
    display: flex;
    align-items: center;
  }

  /* The horizontal line */
  .track-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 4px;
    background: linear-gradient(90deg, rgba(184,134,11,0.2), #b8860b 15%, #b8860b 85%, rgba(184,134,11,0.2));
    border-radius: 2px;
    transform: translateY(-50%);
  }

  /* Event nodes */
  .event {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 0;
    z-index: 2;
  }
  .event .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #b8860b;
    border: 3px solid #1a1a2e;
    box-shadow: 0 0 0 2px #b8860b;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .event:hover .dot {
    transform: scale(1.35);
    box-shadow: 0 0 0 4px #b8860b;
  }
  .event .year {
    font-size: 13px;
    font-weight: 700;
    color: #b8860b;
    margin-top: 10px;
    white-space: nowrap;
    background: rgba(26,26,46,0.85);
    padding: 1px 8px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }
  .event .label {
    font-size: 14px;
    font-weight: 500;
    color: #e8e4da;
    white-space: nowrap;
    margin-top: 4px;
    text-align: center;
    background: rgba(26,26,46,0.85);
    padding: 2px 10px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Alternate above / below the line */
  .event.up { top: calc(50% - 4px); }
  .event.down { top: calc(50% + 4px); }
  .event.up .dot { margin-bottom: 72px; }
  .event.down .dot { margin-top: 72px; }
  .event.up .year,
  .event.up .label { order: -1; margin-top: 0; margin-bottom: 2px; }
  .event.down .year { order: 1; }

  /* Nav */
  .nav {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 18px;
    z-index: 20;
    background: rgba(26,26,46,0.85);
    backdrop-filter: blur(8px);
    padding: 10px 22px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .nav button {
    background: none;
    border: none;
    color: #e8e4da;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s;
  }
  .nav button:hover { background: rgba(255,255,255,0.1); }
  .nav button:disabled { opacity: 0.25; cursor: default; }
  .nav button:hover:disabled { background: none; }
  .nav .dots { display: flex; gap: 6px; }
  .nav .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .nav .dot.active { background: #b8860b; transform: scale(1.35); }
  .nav .dot:hover { background: rgba(255,255,255,0.5); }

  /* responsive */
  @media (max-width: 700px) {
    .hd { padding: 16px 16px 0; flex-wrap: wrap; gap: 4px; }
    .hd h2 { font-size: 20px; }
    .timeline-wrap { padding: 0 12px 50px; }
    .track-line { display: none; }
    .timeline-track {
      height: auto;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }
    .event {
      position: relative;
      top: auto !important;
      transform: none;
      width: 100%;
      flex-direction: row;
      gap: 10px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
    }
    .event .dot { width: 10px; height: 10px; flex-shrink: 0; margin: 0 !important; }
    .event .year { order: 0; margin: 0; font-size: 11px; }
    .event .label { order: 1; margin: 0; font-size: 12px; text-align: left; background: none; padding: 0; }
    .event.up .year,
    .event.up .label { order: unset; margin: 0; }
  }
</style>
</head>
<body>

<div id="stage"></div>

<div class="nav">
  <button id="prevBtn" disabled>◀</button>
  <div class="dots" id="dots"></div>
  <button id="nextBtn">▶</button>
</div>

<script>
const dynasties = [
  {
    name: '秦漢', tag: '秦–漢', period: '221 BC – 220 AD',
    events: [
      { year: '221 BC', label: '秦始皇統一六國', up: false },
      { year: '209 BC', label: '陳勝吳廣起義', up: true },
      { year: '206 BC', label: '秦朝滅亡', up: false },
      { year: '202 BC', label: '西漢建立', up: true },
      { year: '141 BC', label: '漢武帝即位', up: false },
      { year: '138 BC', label: '張騫出使西域', up: true },
      { year: '9 AD', label: '王莽篡漢', up: false },
      { year: '25 AD', label: '東漢建立', up: true },
      { year: '184 AD', label: '黃巾之亂', up: false },
      { year: '220 AD', label: '東漢滅亡', up: true },
    ]
  },
  {
    name: '三國', tag: '魏·蜀·吳', period: '184 – 280',
    events: [
      { year: '184', label: '黃巾之亂', up: false },
      { year: '200', label: '官渡之戰', up: true },
      { year: '208', label: '赤壁之戰', up: false },
      { year: '220', label: '魏國建立', up: true },
      { year: '221', label: '蜀國建立', up: false },
      { year: '229', label: '吳國建立', up: true },
      { year: '263', label: '魏滅蜀', up: false },
      { year: '265', label: '西晉建立', up: true },
      { year: '280', label: '三國歸一', up: false },
    ]
  },
  {
    name: '兩晉南北朝', tag: '晉·五胡·南北朝', period: '265 – 589',
    events: [
      { year: '265', label: '西晉建立', up: false },
      { year: '291', label: '八王之亂', up: true },
      { year: '304', label: '五胡亂華', up: false },
      { year: '316', label: '西晉滅亡', up: true },
      { year: '317', label: '東晉建立', up: false },
      { year: '383', label: '淝水之戰', up: true },
      { year: '420', label: '南朝宋建立', up: false },
      { year: '439', label: '北魏統一北方', up: true },
      { year: '494', label: '孝文帝遷都洛陽', up: false },
      { year: '581', label: '隋朝建立', up: true },
      { year: '589', label: '南北朝結束', up: false },
    ]
  },
  {
    name: '隋朝', tag: '隋', period: '581 – 618',
    events: [
      { year: '581', label: '楊堅建立隋朝', up: false },
      { year: '585', label: '推行均田制', up: true },
      { year: '589', label: '隋滅陳，統一南北', up: false },
      { year: '590s', label: '開皇之治', up: true },
      { year: '604', label: '隋煬帝即位', up: false },
      { year: '605', label: '開鑿大運河', up: true },
      { year: '611', label: '隋末民變', up: false },
      { year: '618', label: '隋朝滅亡', up: true },
    ]
  },
  {
    name: '唐朝', tag: '唐', period: '618 – 907',
    events: [
      { year: '618', label: '唐朝建立', up: false },
      { year: '626', label: '玄武門之變', up: true },
      { year: '627', label: '貞觀之治開始', up: false },
      { year: '690', label: '武則天稱帝', up: true },
      { year: '712', label: '唐玄宗即位', up: false },
      { year: '713', label: '開元盛世', up: true },
      { year: '755', label: '安史之亂爆發', up: false },
      { year: '763', label: '安史之亂平定', up: true },
      { year: '875', label: '黃巢之亂', up: false },
      { year: '907', label: '唐朝滅亡', up: true },
    ]
  }
];

let current = 0;
const stage = document.getElementById('stage');
const dotsContainer = document.getElementById('dots');

function buildSlide(d, i) {
  const slide = document.createElement('div');
  slide.className = 'slide' + (i === 0 ? ' active' : '');
  slide.innerHTML = `
    <div class="hd">
      <h2>${d.name} <small>${d.tag}</small></h2>
      <span class="period">${d.period}</span>
    </div>
    <div class="timeline-wrap">
      <div class="timeline-track">
        <div class="track-line"></div>
        ${d.events.map((e, ei) => `
          <div class="event ${e.up ? 'up' : 'down'}" style="left: ${100 * ei / (d.events.length - 1 || 1)}%">
            <div class="dot"></div>
            <div class="year">${e.year}</div>
            <div class="label">${e.label}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  return slide;
}

dynasties.forEach((d, i) => {
  stage.appendChild(buildSlide(d, i));
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsContainer.appendChild(dot);
});

// Fix event positions after DOM build
function layoutEvents() {
  document.querySelectorAll('.timeline-track').forEach(track => {
    const events = track.querySelectorAll('.event');
    const n = events.length;
    events.forEach((el, i) => {
      if (n <= 1) { el.style.left = '50%'; return; }
      const pct = (i / (n - 1)) * 100;
      el.style.left = pct + '%';
    });
  });
}
layoutEvents();

function goTo(index) {
  if (index < 0 || index >= dynasties.length) return;
  document.querySelectorAll('.slide')[current].classList.remove('active');
  document.querySelectorAll('.slide')[index].classList.add('active');
  current = index;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === dynasties.length - 1;
}

document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
});
</script>
</body>
</html>
